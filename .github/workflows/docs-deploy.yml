name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'falcon_mcp/**'
      - 'scripts/generate_module_docs.py'
      - 'docs-site/**'
      - 'CHANGELOG.md'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

# Deny all permissions at the workflow level; each job grants only what it needs.
permissions: {}

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@39eb6c9dde236bbc368681611e63120a6eb4afac # v5

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Generate module documentation
        run: uv run python scripts/generate_module_docs.py

      - name: Prepare changelog
        run: |
          {
            printf '%s\n' '---'
            printf '%s\n' 'title: Changelog'
            printf '%s\n' 'description: Release history for the Falcon MCP Server.'
            printf '%s\n' '---'
            printf '\n'
            cat CHANGELOG.md
          } > docs-site/src/content/docs/changelog.md

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9

      - name: Install docs dependencies
        run: cd docs-site && pnpm install --frozen-lockfile

      - name: Build docs site
        run: cd docs-site && pnpm run build

      - name: Archive pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory docs-site/dist/ \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
